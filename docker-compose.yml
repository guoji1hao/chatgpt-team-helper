version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auto-gpt-team-local:latest
    container_name: auto-gpt-team
    ports:
      - "5173:5173"
    volumes:
      - ./data:/app/backend/db
    env_file:
      - ./backend/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      DATABASE_PATH: /app/backend/db/database.sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
